name: phanukngan
description: PHANUKNGAN — ທີມງານ AI 100 ຄົນ ສ້າງສັນ Content ລາວ
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ---- UI & FONTS ----
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0

  # ---- NAVIGATION ----
  go_router: ^13.0.0

  # ---- STATE ----
  flutter_riverpod: ^2.4.0

  # ---- BACKEND ----
  supabase_flutter: ^2.3.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # ---- UPLOAD ----
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # ---- n8n WEBHOOK ----
  dio: ^5.4.0

  # ---- NOTIFICATIONS ----
  flutter_local_notifications: ^17.0.0

  # ---- SOCIAL ----
  url_launcher: ^6.2.4

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # ໝາຍເຫດ: ໃຊ້ font ພາສາລາວຜ່ານ package google_fonts ແທນ (GoogleFonts.notoSansLaoTextTheme())
  # ສະນັ້ນບໍ່ຕ້ອງປະກາດ font ໄຟລ໌ ຫລື folder assets ທີ່ບໍ່ມີຢູ່ຈິງ.
  #
  # ເມື່ອໃດທີ່ທ່ານ upload ໄຟລ໌ຮູບ/icon/lottie ເຂົ້າ repo ແລ້ວ
  # ຈຶ່ງເປີດ comment ສ່ວນລຸ່ມນີ້ຄືນ (ຕ້ອງມີຢ່າງໜ້ອຍ 1 ໄຟລ໌ໃນແຕ່ລະ folder):
  #
  # assets:
  #   - assets/images/
  #   - assets/lottie/
  #   - assets/icons/
